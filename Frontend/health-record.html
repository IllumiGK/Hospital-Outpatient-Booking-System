<!DOCTYPE html>
<html lang="en">


<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Health Record - National Healthcare UK</title>
    <link rel="icon" type="image/png" href="images/Favicon.png">
    <link rel="stylesheet" href="style.css">
    <script defer src="script.js"></script>
</head>


<body>
    <!-- =========================
           TOP HEADER / NAVIGATION
      ========================== -->
    <header class="top-banner">

        <!-- Website logo -->
        <img src="images/logo.png" class="banner-logo" alt="National Healthcare UK Logo">

        <!-- Clickable title linking to homepage -->
        <a href="index.html" class="banner-title-link">
            <div class="banner-title">NATIONAL HEALTHCARE UK</div>
        </a>

        <!-- Profile dropdown -->
        <div class="profile-wrapper">
            <img src="images/profile.png" class="profile-icon" id="profileBtn" alt="Profile">

            <div class="profile-menu" id="profileMenu">
                <div onclick="window.location.href='manage-appointments.html'">Manage Appointment</div>
                <div onclick="logout()">Log Out</div>
            </div>
        </div>
    </header>

    <div class="app-shell">
        <main class="app-main">
            <div class="card" style="max-width: 900px;">
                <h1 class="section-title">Health Record</h1>
                <p class="section-subtitle">View your health information below.</p>

                <div class="appointment-item" style="margin-bottom: 18px;">
                    <div class="detail-label">Patient Name:</div>
                    <div class="detail-value">John Smith</div>
                </div>

                <div class="appointment-item" style="margin-bottom: 18px;">
                    <div class="detail-label">Date of Birth:</div>
                    <div class="detail-value">12/05/1990</div>
                </div>

                <div class="appointment-item" style="margin-bottom: 18px;">
                    <div class="detail-label">Blood Group:</div>
                    <div class="detail-value">O+</div>
                </div>

                <div class="appointment-item" style="margin-bottom: 18px;">
                    <div class="detail-label">Allergies:</div>
                    <div class="detail-value">Penicillin</div>
                </div>

                <button type="button" class="btn btn-secondary btn-block" onclick="window.location.href='dashboard.html'">
                    BACK TO HOME
                </button>
            </div>
        </main>
    </div>
</body>
</html>
