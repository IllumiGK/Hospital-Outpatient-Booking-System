<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Register - National Healthcare UK</title>
  <link rel="stylesheet" href="style.css">
  <script defer src="script.js"></script>
</head>

<body>
<header class="top-banner">
  <img src="images/logo.png" class="banner-logo" alt="Logo">

  <div class="banner-title">NATIONAL HEALTHCARE UK</div>

  <div class="profile-wrapper">
    <img src="images/profile.png" class="profile-icon" id="profileBtn" alt="Profile">

    <div class="profile-menu" id="profileMenu">
      <div onclick="location.href='index.html'">Home</div>
      <div onclick="location.href='login.html'">Log In</div>
    </div>
  </div>
</header>

<div class="app-shell">
  <main class="app-main">
    <div class="card">
      <h1 class="card-title">Register for Healthcare Services</h1>
      <p class="card-subtitle">Fill in your details to create an account</p>

      <form>
        <div class="form-group">
          <label class="form-label" for="name">Name</label>
          <input class="form-input" id="name" type="text" placeholder="Full Name">
        </div>

        <div class="form-group">
          <label class="form-label" for="dob">Date of Birth</label>
          <input class="form-input" id="dob" type="date">
        </div>

        <div class="form-group">
          <label class="form-label" for="gender">Gender</label>
          <select class="form-select" id="gender">
            <option value="">Select gender</option>
            <option>Male</option>
            <option>Female</option>
            <option>Other</option>
            <option>Prefer not to say</option>
          </select>
        </div>

        <div class="form-group">
          <label class="form-label" for="address">Address</label>
          <input class="form-input" id="address" type="text" placeholder="Address">
        </div>

        <div class="form-group">
          <label class="form-label" for="email">Email</label>
          <input class="form-input" id="email" type="email" placeholder="email@example.com">
        </div>

        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <input class="form-input" id="password" type="password" placeholder="Password">
        </div>

        <button type="button" class="btn btn-primary btn-block">
          REGISTER
        </button>
      </form>
    </div>
  </main>

  <footer class="app-footer">
    © 2026 National Healthcare. All rights reserved.
  </footer>
</div>

</body>
</html>
