<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Change Appointment - National Healthcare UK</title>
  <link rel="stylesheet" href="style.css">
  <script defer src="script.js"></script>
</head>

<body>

<header class="top-banner">
  <img src="images/logo.png" class="banner-logo" alt="Logo">
  <div class="banner-title">NATIONAL HEALTHCARE UK</div>

  <div class="profile-wrapper">
    <img src="images/profile.png" class="profile-icon" id="profileBtn" alt="Profile">
    <div class="profile-menu" id="profileMenu">
      <div onclick="location.href='dashboard.html'">Home</div>
      <div onclick="location.href='manage-appointments.html'">Manage Appointment</div>
      <div onclick="location.href='index.html'">Log Out</div>
    </div>
  </div>
</header>

<div class="app-shell">
  <main class="app-main">
    <div class="card" style="max-width: 500px;">
      <h1 class="section-title">Change Appointment</h1>

      <div class="form-group">
        <label class="form-label">Select New Date</label>
        <input type="date" class="form-input">
      </div>

      <div class="form-group">
        <label class="form-label">Hospital</label>
        <input type="text" class="form-input" placeholder="Hospital">
      </div>

      <button class="btn btn-primary btn-block"
              onclick="location.href='dashboard.html'">
        CHANGE
      </button>

    </div>
  </main>

  <footer class="app-footer">
    © 2026 National Healthcare. All rights reserved.
  </footer>
</div>

</body>
</html>
