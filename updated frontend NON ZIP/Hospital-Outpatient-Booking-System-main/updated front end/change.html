<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Change Appointment - National Healthcare UK</title>
  <link rel="stylesheet" href="style.css">
  <script defer src="script.js"></script>
</head>

<body>

<header class="top-banner">
  <img src="images/logo.png" class="banner-logo" alt="Logo">
  <div class="banner-title">NATIONAL HEALTHCARE UK</div>

  <div class="profile-wrapper">
    <img src="images/profile.png" class="profile-icon" id="profileBtn" alt="Profile">
    <div class="profile-menu" id="profileMenu">
      <div onclick="location.href='dashboard.html'">Home</div>
      <div onclick="location.href='manage-appointments.html'">Manage Appointment</div>
      <div onclick="location.href='index.html'">Log Out</div>
    </div>
  </div>
</header>

<div class="app-shell">
  <main class="app-main">
    <div class="card" style="max-width: 500px;">
      <h1 class="section-title">Change Appointment</h1>

      <div class="form-group">
        <label class="form-label">Select New Date</label>
        <input type="date" id="change-date" class="form-input">
      </div>

      <div class="form-group">
        <label class="form-label">Select New Time</label>
        <select id="change-time" class="form-select">
          <option value="09:00">09:00</option>
          <option value="10:00">10:00</option>
          <option value="10:30">10:30</option>
          <option value="11:00">11:00</option>
          <option value="13:00">13:00</option>
          <option value="13:30">13:30</option>
          <option value="15:00">15:00</option>
          <option value="15:30">15:30</option>
          <option value="16:00">16:00</option>
          <option value="16:30">16:30</option>
          <option value="17:00">17:00</option>
        </select>
      </div>

      <div class="form-group">
        <label class="form-label">Hospital</label>
        <select id="change-hospital" class="form-select">
          <option value="Imperial College Healthcare NHS Trust">Imperial College Healthcare NHS Trust</option>
          <option value="St Mary's Hospital">St Mary's Hospital</option>
          <option value="Chelsea and Westminster Hospital">Chelsea and Westminster Hospital</option>
          <option value="Royal London Hospital">Royal London Hospital</option>
          <option value="Guy's and St Thomas' Hospital">Guy's and St Thomas' Hospital</option>
        </select>
      </div>

      <button type="button" class="btn btn-primary btn-block" onclick="updateAppointment()">
        CHANGE
      </button>
    </div>
  </main>

  <footer class="app-footer">
    © 2026 National Healthcare. All rights reserved.
  </footer>
</div>

</body>
</html>
