<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Confirm Appointment - National Healthcare UK</title>
  <link rel="stylesheet" href="style.css">
  <script defer src="script.js"></script>
</head>

<body>

<header class="top-banner">
  <img src="images/logo.png" class="banner-logo" alt="Logo">
  <div class="banner-title">NATIONAL HEALTHCARE UK</div>

  <div class="profile-wrapper">
    <img src="images/profile.png" class="profile-icon" id="profileBtn" alt="Profile">
    <div class="profile-menu" id="profileMenu">
      <div onclick="location.href='dashboard.html'">Home</div>
      <div onclick="location.href='manage-appointments.html'">Manage Appointment</div>
      <div onclick="location.href='index.html'">Log Out</div>
    </div>
  </div>
</header>

<div class="app-shell">
  <main class="app-main">
    <div class="card" style="max-width: 720px;">
      <h1 class="section-title">Confirm Appointment Page</h1>
      <p class="section-subtitle">
        Use this page to review your appointment details.
      </p>

      <div class="details-grid">
        <div>
          <div class="detail-label">PATIENT EMAIL :-</div>
          <div class="detail-value" id="confirm-email">-</div>
        </div>
        <div>
          <div class="detail-label">DATE :-</div>
          <div class="detail-value" id="confirm-date">-</div>
        </div>
        <div>
          <div class="detail-label">TIME :-</div>
          <div class="detail-value" id="confirm-time">-</div>
        </div>
        <div>
          <div class="detail-label">REASON FOR VISIT :-</div>
          <div class="detail-value" id="confirm-reason">-</div>
        </div>
      </div>

      <button type="button" class="btn btn-primary btn-block"
              onclick="location.href='manage-appointments.html'">
        GO TO MANAGE APPOINTMENTS
      </button>
    </div>
  </main>

  <footer class="app-footer">
    © 2026 National Healthcare. All rights reserved.
  </footer>
</div>

</body>
</html>
